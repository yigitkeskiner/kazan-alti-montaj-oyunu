name: GitHub Pages'e Yayınla

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Kaynak kodu al
        uses: actions/checkout@v4
      - name: GitHub Pages'i hazırla
        uses: actions/configure-pages@v5
      - name: Site dosyalarını paketle
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."
      - name: Yayınla
        id: deployment
        uses: actions/deploy-pages@v4
